name: Matrix Core CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch repository source
        run: |
          git init .
          git remote add origin https://github.com/triangel7777-tech/Matrix-Core-Kernel.git
          git fetch --depth=1 origin $GITHUB_SHA
          git checkout FETCH_HEAD
      - name: Python version
        run: python --version
      - name: Install package
        run: python -m pip install -e .
      - name: Unit tests
        run: python -m unittest discover -s tests -v
      - name: CLS validation
        run: matrix-core validate examples/complete_layered_structure_v0_2.json
      - name: Policy validation
        run: matrix-core validate-all examples/policies
