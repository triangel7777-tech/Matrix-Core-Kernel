name: Matrix Core CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch repository source
        run: |
          git init .
          git remote add origin https://github.com/triangel7777-tech/Matrix-Core-Kernel.git
          git fetch --depth=1 origin $GITHUB_SHA
          git checkout FETCH_HEAD
      - name: Python version
        run: python --version
      - name: Install package
        run: python -m pip install -e .
      - name: Unit tests
        run: python -m unittest discover -s tests -v
      - name: CLS validation
        run: matrix-core validate examples/complete_layered_structure_v0_2.json
      - name: Policy validation
        run: matrix-core validate-all examples/policies
      - name: Build proof artifact
        run: |
          mkdir -p dist proof clean_install_proof
          zip -r dist/matrix-core-kernel-source-${GITHUB_SHA}.zip . -x '.git/*' 'dist/*' 'proof/*' 'clean_install_proof/*'
          sha256sum dist/matrix-core-kernel-source-${GITHUB_SHA}.zip | tee proof/matrix-core-kernel-source-${GITHUB_SHA}.sha256
      - name: Clean install from proof artifact
        run: |
          python -m venv clean_install_venv
          ./clean_install_venv/bin/python -m pip install --upgrade pip
          ./clean_install_venv/bin/python -m pip install dist/matrix-core-kernel-source-${GITHUB_SHA}.zip
          ./clean_install_venv/bin/matrix-core validate examples/complete_layered_structure_v0_2.json | tee clean_install_proof/cls_validation.json
          ./clean_install_venv/bin/matrix-core validate-all examples/policies | tee clean_install_proof/policy_validation.json
          ./clean_install_venv/bin/python - <<'PY' | tee clean_install_proof/import_version.txt
          import matrix_core_kernel
          print(matrix_core_kernel.__version__)
          PY
          sha256sum clean_install_proof/* | tee clean_install_proof/checksums.sha256
      - name: Upload proof artifact
        uses: actions/upload-artifact@v4
        with:
          name: matrix-core-kernel-source-proof
          path: |
            dist/matrix-core-kernel-source-${{ github.sha }}.zip
            proof/matrix-core-kernel-source-${{ github.sha }}.sha256
            clean_install_proof/*
