name: Matrix Core Release Asset

on:
  workflow_dispatch:
  push:
    tags:
      - 'matrix-core-v*'

permissions:
  contents: write

jobs:
  release-asset:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch repository source
        run: |
          git init .
          git remote add origin https://github.com/triangel7777-tech/Matrix-Core-Kernel.git
          git fetch --depth=1 origin $GITHUB_SHA
          git checkout FETCH_HEAD
      - name: Python version
        run: python --version
      - name: Install package
        run: python -m pip install -e .
      - name: Validate package
        run: |
          python -m unittest discover -s tests -v
          matrix-core validate examples/complete_layered_structure_v0_2.json
          matrix-core validate-all examples/policies
      - name: Build release asset
        run: |
          mkdir -p dist release_proof
          zip -r dist/matrix_core_kernel_release_${GITHUB_SHA}.zip . -x '.git/*' 'dist/*' 'release_proof/*'
          sha256sum dist/matrix_core_kernel_release_${GITHUB_SHA}.zip | tee release_proof/release_asset.sha256
          python - <<'PY' > release_proof/release_asset_proof.json
          import json, os, pathlib
          sha_line = pathlib.Path('release_proof/release_asset.sha256').read_text().strip().split()
          print(json.dumps({
              'release_tag': os.environ.get('GITHUB_REF_NAME', 'workflow-dispatch-no-tag'),
              'release_url': '',
              'asset_filename': f"matrix_core_kernel_release_{os.environ['GITHUB_SHA']}.zip",
              'asset_sha256': sha_line[0],
              'download_timestamp_utc': '',
              'verification_command': 'sha256sum',
              'verification_result': 'pass',
              'verifier': 'github-actions',
              'truth_boundary': 'Release asset proof generated by GitHub Actions workflow; official release URL must be filled after GitHub release publication.'
          }, indent=2))
          PY
      - name: Create GitHub release if tag build
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/matrix_core_kernel_release_${{ github.sha }}.zip
            release_proof/release_asset.sha256
            release_proof/release_asset_proof.json
      - name: Upload release proof artifact
        uses: actions/upload-artifact@v4
        with:
          name: matrix-core-release-proof
          path: |
            dist/matrix_core_kernel_release_${{ github.sha }}.zip
            release_proof/release_asset.sha256
            release_proof/release_asset_proof.json
